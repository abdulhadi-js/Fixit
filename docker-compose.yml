version: '3.9'

services:
  db:
    image: postgres:16
    container_name: fixit_db
    restart: always
    environment:
      POSTGRES_USER: fixit
      POSTGRES_PASSWORD: fixit_secret
      POSTGRES_DB: fixit_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: fixit_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fixit.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  pgdata:
