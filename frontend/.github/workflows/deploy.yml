name: Frontend CI/CD — Test, Build & Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: fixit-frontend-app

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:ci

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Static Export
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Static Export
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to S3 + CloudFront (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-static-export
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static files to S3
        run: |
          # Static assets (_next/static) — cache for 1 year (immutable)
          aws s3 sync out/_next/static s3://${{ env.S3_BUCKET }}/_next/static \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          # HTML files — no cache (so new deploys are seen immediately)
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "_next/static/*" \
            --cache-control "public, max-age=0, must-revalidate"

          echo "✅ S3 upload complete!"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated!"
