services:
  - type: web
    name: fixit-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: fixit-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fixit-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: fixit-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fixit-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: fixit-db
          property: database
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://fixit-frontend.vercel.app" # Update this when you deploy the frontend
      # Note: The following secrets need to be entered manually in the Render Dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_OTP_TEMPLATE_NAME
        value: otp_verification

databases:
  - name: fixit-db
    databaseName: fixit_db
    user: fixit
    plan: free
